<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>The Modern Curator | High-End Digital Editorial</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://googleapis.com" rel="stylesheet"/>
    <script id="tailwind-config">
          tailwind.config = {
            darkMode: "class",
            theme: {
              extend: {
                "colors": {
                        "primary": "#0040e0",
                        "bg-primary ": "#21d15c",
                        "on-primary": "#ffffff",
                        "surface": "#f8f9fa",
                        "on-surface": "#191c1d",
                        "outline": "#747688",
                        "surface-container-highest": "#e1e3e4",
                },
                "fontFamily": {
                        "headline": ["Manrope", "sans-serif"],
                        "body": ["Inter", "sans-serif"],
                }
              },
            },
          }
    </script>
    <style>
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        body { background-color: #f8f9fa; color: #191c1d; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        #mobile-menu { transition: transform 0.3s ease-in-out; transform: translateX(100%); }
        #mobile-menu.active { transform: translateX(0); }
    </style>
</head>

<body class="bg-surface">

<!-- Navbar -->
<header class="bg-white/80 dark:bg-slate-900/80 backdrop-blur-xl fixed top-0 w-full z-50 shadow-sm">
    <nav class="flex items-center justify-between px-3 sm:px-4 md:px-6 lg:px-8 py-3 sm:py-4 max-w-7xl mx-auto">

        <!-- Left -->
        <div class="flex items-center gap-2 sm:gap-4 md:gap-8 min-w-0">
            <span class="font-['Manrope'] text-base sm:text-lg md:text-xl lg:text-2xl font-black tracking-tight truncate">
                <span class="text-green-500">Social</span><span class="text-gray-400 font-medium">Nest</span>
            </span>

            <!-- Desktop Links -->
            <div class="hidden sm:flex items-center gap-6">
                <a href="{% url 'home' %}" class="uppercase text-xs text-slate-500 hover:text-blue-600">Home</a>
                <a href="{% url 'news' %}" class="uppercase text-xs text-slate-500 hover:text-blue-600">News</a>
                <a href="{% url 'documentry' %}" class="uppercase text-xs text-slate-500 hover:text-blue-600">Documentry</a>
                <a href="{% url 'story' %}" class="uppercase text-xs text-slate-500 hover:text-blue-600">Story</a>
                <a href="{% url 'food' %}" class="uppercase text-xs text-slate-500 hover:text-blue-600">Food</a>
                <a href="{% url 'travel' %}" class="uppercase text-xs text-slate-500 hover:text-blue-600">Travel</a>
            </div>
        </div>

        <!-- Right -->
        <div class="flex items-center gap-2 sm:gap-3">
            
                <a href="{% url 'login' %}">
                    <button class="hidden bg-blue-400 hover:bg-blue-500 sm:inline-flex text-on-primary px-3 sm:px-5 py-1.5 sm:py-2 rounded-full text-xs sm:text-sm font-bold whitespace-nowrap">
                        Login
                    </button>
                </a>
            
            

            <button id="menu-toggle" class="sm:hidden p-2">
                <span class="material-symbols-outlined text-2xl sm:text-3xl">☰</span>
            </button>
        </div>
    </nav>
</header>

<!-- Mobile Menu -->
<div id="mobile-menu" class="fixed inset-0 bg-white dark:bg-slate-950 z-[60] lg:hidden flex flex-col p-6 sm:p-8 overflow-y-auto">
    
    <!-- Close -->
    <div class="flex justify-end mb-6">
        <button id="menu-close">
            <span class="material-symbols-outlined text-3xl sm:text-4xl">close</span>
        </button>
    </div>

    <!-- Links -->
    <div class="flex flex-col gap-6 sm:gap-8 text-center">
        <a href="{% url 'home' %}" class="text-xl sm:text-2xl font-headline font-medium hover:text-blue-600">Home</a>
        <a href="{% url 'news' %}" class="text-xl sm:text-2xl font-headline font-medium hover:text-blue-600">News</a>
        <a href="{% url 'documentry' %}" class="text-xl sm:text-2xl font-headline font-medium hover:text-blue-600">Documentry</a>
        <a href="{% url 'story' %}" class="text-xl sm:text-2xl font-headline font-medium hover:text-blue-600">Story</a>
        <a href="{% url 'food' %}" class="text-xl sm:text-2xl font-headline font-medium hover:text-blue-600">Food</a>
        <a href="{% url 'travel' %}" class="text-xl sm:text-2xl font-headline font-medium hover:text-blue-600">Travel</a>

        <hr class="border-slate-200">
        <a href="{% url 'login' %}">
                    <button class="bg-blue-400 hover:bg-blue-500 sm:inline-flex text-on-primary px-3 sm:px-5 py-1.5 sm:py-2 rounded-full text-xs sm:text-sm font-bold whitespace-nowrap">
                        Login
                    </button>
        </a>
       
    </div>
</div>

<!-- Main -->

    {% block base %}{% endblock base %}


{% include "footer.html" %}

<!-- Script -->
<script>
const menuToggle = document.getElementById('menu-toggle');
const menuClose = document.getElementById('menu-close');
const mobileMenu = document.getElementById('mobile-menu');

menuToggle.addEventListener('click', () => mobileMenu.classList.add('active'));
menuClose.addEventListener('click', () => mobileMenu.classList.remove('active'));

mobileMenu.querySelectorAll('a').forEach(link => {
    link.addEventListener('click', () => mobileMenu.classList.remove('active'));
});
</script>

</body>
</html>
