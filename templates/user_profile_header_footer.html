<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>CoreBlog | Responsive Dashboard</title>

    <!-- TailwindCSS v3 + Forms + Container Queries -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

    <style>
        :root { --primary-blue: #1A4175; }
        .bg-primary { background-color: var(--primary-blue); }
        .text-primary { color: var(--primary-blue); }
        .border-primary { border-color: var(--primary-blue); }
        .ring-primary:focus { --tw-ring-color: var(--primary-blue); }
        
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #f1f1f1;
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #1A4175;
        }
        
        /* Prevent body scroll when mobile sidebar is open */
        body.sidebar-open {
            overflow: hidden;
        }
        
        /* Smooth transitions */
        #sidebar {
            will-change: transform;
            transition: transform 0.3s ease-out;
        }
        
        /* Backdrop overlay for mobile */
        .sidebar-backdrop {
            position: fixed;
            inset: 0;
            background-color: rgba(0, 0, 0, 0.5);
            z-index: 35;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.3s ease, visibility 0.3s ease;
        }
        
        .sidebar-backdrop.active {
            opacity: 1;
            visibility: visible;
        }
        
        button, a {
            -webkit-tap-highlight-color: transparent;
        }
        
        @media (max-width: 640px) {
            .posts-table-container table th, 
            .posts-table-container table td {
                padding: 0.75rem 0.5rem;
            }
        }
    </style>
</head>
<body class="bg-gray-50 font-sans antialiased text-gray-800">

<div class="flex min-h-screen relative">

    <!-- Mobile Backdrop Overlay -->
    <div id="sidebarBackdrop" class="sidebar-backdrop"></div>

    <!-- Mobile Top Bar (visible only on < lg) -->
    <div class="lg:hidden fixed top-0 left-0 right-0 bg-white/95 backdrop-blur-sm shadow-md z-50 flex items-center justify-between px-4 py-3 border-b border-gray-100">
        <div class="flex items-center">
            <span class="text-green-500">Social</span><span class="text-gray-400 font-medium">Nest</span>
        </div>
        <button id="mobileMenuBtn" aria-label="Open menu" class="text-2xl text-primary focus:outline-none focus:ring-2 focus:ring-primary rounded-lg p-1">
            ☰
        </button>
    </div>

    <!-- Sidebar - Fixed on desktop, slide-out on mobile -->
    <aside id="sidebar"
        class="w-72 lg:w-64 bg-white border-r border-gray-200 fixed top-0 left-0 h-full z-40 
        transform -translate-x-full lg:translate-x-0 transition-transform duration-300 ease-out shadow-xl lg:shadow-none
        flex flex-col overflow-y-auto">

        <!-- Logo area with close button for mobile -->
        <div class="p-6 pt-8 lg:pt-6 border-b border-gray-100 flex items-center justify-between">
            <h1 class="text-2xl font-bold tracking-tight">
                <span class="text-green-500">Social</span><span class="text-gray-400 font-medium">Nest</span>
            </h1>
            <button id="closeSidebarBtn" class="lg:hidden text-gray-500 hover:text-primary text-xl focus:outline-none focus:ring-2 focus:ring-primary rounded-full p-1" aria-label="Close menu">
                ✕
            </button>
        </div>

        <!-- Navigation Menu -->
        <nav class="flex-1 px-4 py-6 space-y-1.5">
            
            <a href="{% url 'profile' %}" class="flex items-center gap-3 px-4 py-3 text-gray-600 hover:scale-105  rounded-xl transition-all duration-150 group">
                <svg class="w-5 h-5 text-gray-400 group-hover:text-primary" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
                Profile
            </a>
            <a href="{% url 'home' %}" class="flex items-center gap-3 px-4 py-3 text-gray-600 hover:scale-105 rounded-xl font-semibold transition-all duration-150">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>
                Home
            </a>
            <a href="{% url 'my_posts' %}" class="flex items-center gap-3 px-4 py-3 text-gray-600 hover:bg-gray-50 rounded-xl">
                <svg class="w-5 h-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"/></svg>
                My Posts
            </a>
            <a href="{% url 'add_post' %}" class="flex items-center gap-3 px-4 py-3 text-gray-600 hover:bg-gray-50 rounded-xl">
                <svg class="w-5 h-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
                Add New Post
            </a>
            <a href="#" class="flex items-center gap-3 px-4 py-3 text-gray-600 hover:bg-gray-50 rounded-xl">
                <svg class="w-5 h-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/></svg>
                Security

            <a href="#" class="flex items-center gap-3 px-4 py-3 text-gray-600 hover:bg-gray-50 rounded-xl">
                <svg class="w-5 h-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"/></svg>
                Favorites
            </a>
            <a href="#" class="flex items-center gap-3 px-4 py-3 text-gray-600 hover:bg-gray-50 rounded-xl">
                <svg class="w-5 h-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
                Preferences
            </a>
        </nav>

        <!-- Logout Section -->
        <div class="p-5 border-t border-gray-100 mt-auto">
            <a href="{% url 'logout' %}" class="w-full flex items-center justify-center gap-2 px-4 py-3 text-red-600 hover:bg-red-50 rounded-xl font-semibold transition-all duration-150">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>
                Logout
            </a>
        </div>
    </aside>
    {% block content %}{% endblock content %}

    <!-- Sidebar Toggle Logic -->
<script>
    const sidebar = document.getElementById('sidebar');
    const backdrop = document.getElementById('sidebarBackdrop');
    const openBtn = document.getElementById('mobileMenuBtn');
    const closeBtn = document.getElementById('closeSidebarBtn');

    function toggleSidebar() {
        const isOpen = !sidebar.classList.contains('-translate-x-full');
        
        if (isOpen) {
            // Close it
            sidebar.classList.add('-translate-x-full');
            backdrop.classList.remove('active');
            document.body.classList.remove('sidebar-open');
        } else {
            // Open it
            sidebar.classList.remove('-translate-x-full');
            backdrop.classList.add('active');
            document.body.classList.add('sidebar-open');
        }
    }

    openBtn.addEventListener('click', toggleSidebar);
    closeBtn.addEventListener('click', toggleSidebar);
    backdrop.addEventListener('click', toggleSidebar);

    // Close on escape key
    window.addEventListener('keydown', (e) => {
        if (e.key === 'Escape' && !sidebar.classList.contains('-translate-x-full')) {
            toggleSidebar();
        }
    });
</script>
