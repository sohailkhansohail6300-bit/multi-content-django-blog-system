{% extends "user_profile_header_footer.html" %}
{% block content %}

    <!-- Main Content -->
    <main class="flex-1 lg:ml-64 p-2 md:p-3 lg:p-4 pt-20 lg:pt-10">
        
         

<div class="min-h-screen bg-gray-50 flex items-center justify-center p-2">
  <form action="#" method="POST" enctype="multipart/form-data" class="w-full max-w-lg bg-white p-2 rounded-xl shadow-lg space-y-2">
    {% csrf_token %}
    <p class='text-center text-red-500'>{{error}}</p>
    <h2 class="text-2xl font-bold text-gray-900 border-b pb-4">Create New Post</h2>

    <!-- Title Field -->
    <div>
      <label for="title" class="block text-sm font-semibold text-gray-700 mb-1">Title</label>
      <input type="text" value='{{ doc.title }}' id="title" name="title" placeholder="Enter a catchy title" required 
             class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:outline-none transition">
    </div>

    <!-- Category Option -->
    <div>
      <label for="category" class="block text-sm font-semibold text-gray-700 mb-1">Category</label>
      <select id="category" name="category" required 
              class="w-full px-4 py-2 border border-gray-300 rounded-lg bg-white focus:ring-2 focus:ring-indigo-500 focus:outline-none transition">
        <option value="{{ doc.category }}" disabled selected>{{ doc.category }}</option>
        <option value="Documentry">Documentry</option>
        <option value="News">news</option>
        <option value="Story">Story</option>
        <option value="Food">Food</option>
        <option value="Travel">Travel</option>
      </select>
    </div>

    <!-- Image Upload -->
    <div>
      <label class="block text-sm font-semibold text-gray-700 mb-1">Cover Image</label>
      <div class="mt-1 flex justify-center px-6 pt-5 pb-6 border-2 border-gray-300 border-dashed rounded-lg hover:border-indigo-400 transition-colors">
        <div class="space-y-1 text-center">
          <svg class="mx-auto h-12 w-12 text-gray-400" stroke="currentColor" fill="none" viewBox="0 0 48 48" aria-hidden="true">
            <path d="M28 8H12a4 4 0 00-4 4v20m32-12v8m0 0v8a4 4 0 01-4 4H12a4 4 0 01-4-4v-4m32-4l-3.172-3.172a4 4 0 00-5.656 0L28 28M8 32l9.172-9.172a4 4 0 015.656 0L28 28m0 0l4 4m4-24h8m-4-4v8m-12 4h.02" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
          </svg>
          <div class="flex text-sm text-gray-600">
            <label for="image-upload" class="relative cursor-pointer bg-white rounded-md font-medium text-indigo-600 hover:text-indigo-500">
              <span>Upload a file</span>
              <input value='{{ doc.image.url }}' id="image-upload" name="image" type="file" class="sr-only" accept="image/*">
            </label>
            <p class="pl-1">or drag and drop</p>
          </div>
          <p class="text-xs text-gray-500">PNG, JPG up to 10MB</p>
        </div>
      </div>
    </div>

    <!-- Description Textarea -->
    <div>
      <label for="description" class="block text-sm font-semibold text-gray-700 mb-1">Description</label>
      <textarea value={{ doc.description }} id="description" name="description" rows="4" placeholder="Tell us more about it..." 
                class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:outline-none transition">{{ doc.description }}</textarea>
    </div>

    <!-- Submit Button -->
    <button type="submit" class="w-full bg-indigo-600 text-white font-bold py-3 rounded-lg hover:bg-indigo-700 shadow-md transform hover:-translate-y-0.5 transition-all">
      Create Post
    </button>
  </form>
</div>



        

    </main>
    
</div>

{% endblock content %}
