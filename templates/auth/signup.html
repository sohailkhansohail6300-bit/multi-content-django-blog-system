{% extends "index.html" %}
{% block base %}

<!-- Main Centering Wrapper -->
<div class="min-h-screen mt-16 flex items-center justify-center bg-[#f8faf7] sm:px-4 py-12">
    
    <!-- Your Form Container -->
    <div class="max-w-md w-full bg-white rounded-2xl shadow-xl border border-[#e5e7eb] overflow-hidden">
        
        <!-- Header -->
        <div class="sm:px-8 pt-8 sm:pb-6 text-center">
            <h1 class="text-xl sm:text-3xl font-bold text-[#2c5f2d] tracking-tight">Create Account</h1>
            <p class="text-[#787e74] mt-2 sm:text-sm">Join our community of storytellers today.</p>
        </div>

        <!-- Form -->
        <form action="#" method="POST" enctype="multipart/form-data" class="sm:px-8 p:x-4 pb-8 space-y-2">
            <p class="text-red-500 text-xl font-italic mb-2 ml-1">{{ error }}</p>
            {% csrf_token %} <!-- 🛡️ Don't forget this for Django! -->
            
            <!-- Username -->
            <div>
                <label class="block text-xs font-bold text-[#444a41] uppercase tracking-widest mb-1 ml-1">Username</label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-[#787e74]">
                        <i class="fa-regular fa-user"></i>
                    </span>
                    <input type="text" name="name" value="{{ request.user.username }}" required
                        class="w-full px-1 py-2 sm:px-3 sm:py-2.5 bg-[#f3f4f1] border-transparent focus:border-[#2c5f2d] focus:bg-white focus:ring-0 rounded-xl transition-all duration-200 outline-none text-sm"
                        placeholder="name">
                </div>
            </div>

            <!-- Email -->
            <div>
                <label class="block text-xs font-bold text-[#444a41] uppercase tracking-widest mb-1 ml-1">Email Address</label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-[#787e74]">
                        <i class="fa-regular fa-envelope"></i>
                    </span>
                    <input type="email" name="email" value="{{ request.user.email }}" required
                        class="w-full px-1 py-2 sm:px-3 sm:py-2.5 bg-[#f3f4f1] border-transparent focus:border-[#2c5f2d] focus:bg-white focus:ring-0 rounded-xl transition-all duration-200 outline-none text-sm"
                        placeholder="email">
                </div>
            </div>

            <!-- Password -->
            <div>
                <label class="block text-xs font-bold text-[#444a41] uppercase tracking-widest mb-2 ml-1">Password</label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-[#787e74]">
                        <i class="fa-solid fa-lock"></i>
                    </span>
                    <input type="password" name="password" value="{{ request.user.password }}" required
                        class="w-full px-1 py-2 sm:px-3 sm:py-2.5 bg-[#f3f4f1] border-transparent focus:border-[#2c5f2d] focus:bg-white focus:ring-0 rounded-xl transition-all duration-200 outline-none text-sm"
                        placeholder="••••••••">
                </div>
            </div>
            <div>
                <label class="block text-xs font-bold text-[#444a41] uppercase tracking-widest mb-1 ml-1">Confirm Password</label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-[#787e74]">
                        <i class="fa-solid fa-lock"></i>
                    </span>
                    <input type="password" name="password2" required
                        class="w-full px-1 py-2 sm:px-3 sm:py-2.5 bg-[#f3f4f1] border-transparent focus:border-[#2c5f2d] focus:bg-white focus:ring-0 rounded-xl transition-all duration-200 outline-none text-sm"
                        placeholder="••••••••">
                </div>
            </div>
            <div>
                <label class="block text-xs font-bold text-[#444a41] uppercase tracking-widest mb-1 ml-1">Profile Picture</label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-[#787e74]">
                        <i class="fa-solid fa-image"></i>
                    </span>
                    {% if request.user.profile.image %}
                        <img src="{{ request.user.profile.image.url }}" alt="Current Profile Picture" class="w-16 h-16 rounded-full object-cover mr-3">
                    {% endif %}
                    <input type="file" name="image" accept="image/*" value='{{ request.user.profile.image.url }}'
                        class="w-full px-1 py-2 sm:px-3 sm:py-2.5 bg-[#f3f4f1] border-transparent focus:border-[#2c5f2d] focus:bg-white focus:ring-0 rounded-xl transition-all duration-200 outline-none text-sm"
                        placeholder="Choose a profile picture">
                </div>
            </div>

            <!-- Submit Button -->
            <button type="submit" 
                class="w-full bg-blue-400 hover:bg-blue-500 text-white font-bold py-3.5 rounded-xl shadow-lg shadow-green-100 transition-all duration-300 transform hover:-translate-y-0.5 active:scale-95 uppercase tracking-widest text-xs mt-20">
                Create Account
            </button>

            <!-- Social/Divider... (kept same as your code) -->
             <div class="relative flex items-center py-2">
                <div class="flex-grow border-t border-[#e5e7eb]"></div>
                <span class="flex-shrink mx-4 text-[#787e74] text-[10px] uppercase font-bold tracking-tighter"></span>
                <div class="flex-grow border-t border-[#e5e7eb]"></div>
            </div>

           
        </form>

        <!-- Footer -->
        <div class="bg-[#f3f4f1] px-8 py-6 text-center border-t border-[#e5e7eb]">
            <p class="text-sm text-[#444a41]">
                Already have an account? 
                <a href="{% url 'login' %}" class="text-blue-500 font-bold hover:underline ml-1">Login here</a>
            </p>
        </div>
    </div>
</div>

{% endblock base %}
