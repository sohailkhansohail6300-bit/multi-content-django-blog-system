{% extends "index.html" %}
{% block base %}

<!-- Main Centering Wrapper -->
<div class="min-h-screen mt-6 flex items-center justify-center bg-[#f8faf7] sm:px-4 py-12">
    
    <!-- Your Form Container -->
    <div class="max-w-md w-full bg-white rounded-2xl shadow-xl border border-[#e5e7eb] overflow-hidden">
        
        <!-- Header -->
        <div class="sm:px-8 pt-8 sm:pb-6 text-center">
            <h1 class="text-xl sm:text-3xl font-bold text-black tracking-tight">Welcome Back</h1>
            <p class="text-[#787e74] mt-2 sm:text-sm">Enter your credentials to access your account.</p>
        </div>

        <!-- Form -->
        <form action="#" method="POST" class="sm:px-8 px-4 pb-8 space-y-4">
            <p class="text-red-500 text-xl font-italic mb-2 ml-1">{{ error }}</p>
            {% csrf_token %}
            
            <!-- Username -->
            <div>
                <label class="block text-xs font-bold text-[#444a41] uppercase tracking-widest mb-1 ml-1">Username</label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-[#787e74]">
                        <i class="fa-regular fa-user"></i>
                    </span>
                    <input type="text" name="name" required
                        class="w-full px-1 py-2 sm:px-3 sm:py-2.5 bg-[#f3f4f1] border-transparent focus:border-[#2c5f2d] focus:bg-white focus:ring-0 rounded-xl transition-all duration-200 outline-none text-sm"
                        placeholder="Your username">
                </div>
            </div>

            <!-- Password -->
            <div>
                <div class="flex justify-between items-center mb-1 ml-1">
                    <label class="block text-xs font-bold text-[#444a41] uppercase tracking-widest">Password</label>
                    <a href="#" class="text-[10px] font-bold text-[#2c5f2d] hover:underline uppercase tracking-tighter"></a>
                </div>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-[#787e74]">
                        <i class="fa-solid fa-lock"></i>
                    </span>
                    <input type="password" name="password" required
                        class="w-full pl-10 pr-12 py-3 bg-[#f3f4f1] border-transparent focus:border-[#2c5f2d] focus:bg-white focus:ring-0 rounded-xl transition-all duration-200 outline-none text-sm"
                        placeholder="••••••••">
                </div>
            </div>

            

            <!-- Submit Button -->
            <button type="submit" 
                class="w-full bg-blue-400 hover:bg-blue-500 text-white font-bold py-3.5 rounded-xl shadow-lg shadow-green-100 transition-all duration-300 transform hover:-translate-y-0.5 active:scale-95 uppercase tracking-widest text-xs mt-2">
                Sign In
            </button>

            <!-- Divider -->
            <div class="relative flex items-center py-2">
                <div class="flex-grow border-t border-[#e5e7eb]"></div>
                <span class="flex-shrink mx-4 text-[#787e74] text-[10px] uppercase font-bold tracking-tighter">Or login with</span>
                <div class="flex-grow border-t border-[#e5e7eb]"></div>
            </div>

           
        </form>

        <!-- Footer -->
        <div class="bg-[#f3f4f1] px-8 py-6 text-center border-t border-[#e5e7eb]">
            <p class="text-sm text-[#444a41]">
                Don't have an account? 
                <a href="{% url 'signup' %}" class="text-blue-500 font-bold hover:underline ml-1">Register here</a>
            </p>
        </div>
    </div>
</div>

{% endblock base %}
